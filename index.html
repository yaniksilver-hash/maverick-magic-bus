<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Maverick Magic Bus — Voyage</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;800&family=Caveat:wght@600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a0a; --cream:#f3ead6; --green:#97c459; --growth:#7bb02b;
    --warm:#d8c089; --impact:#c490e0; --fun:#f0c040;
    --horizon: 62vh;            /* where the sky meets the ground */
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:
      radial-gradient(140% 80% at 50% 0%, #141d0d 0%, #0c1108 46%, var(--bg) 80%);
    color:var(--cream); font-family:'Inter',system-ui,sans-serif;
    min-height:100%; overflow-x:hidden; position:relative;
    display:flex; flex-direction:column; align-items:center; -webkit-font-smoothing:antialiased;
  }
  /* ---- sky: stars live ONLY above the horizon, fading out before it ---- */
  #stars{position:fixed; top:0; left:0; width:100%; height:var(--horizon); z-index:0;
    pointer-events:none;
    -webkit-mask-image:linear-gradient(to bottom,#000 0%,#000 52%,transparent 92%);
            mask-image:linear-gradient(to bottom,#000 0%,#000 52%,transparent 92%)}
  #fx{position:fixed; inset:0; z-index:60; pointer-events:none}

  .wrap{position:relative; z-index:10; width:100%; max-width:1040px;
    padding:clamp(34px,6vh,64px) 22px 70px; text-align:center}

  .kicker{font-family:'Caveat',cursive; font-size:1.45rem; color:var(--green);
    letter-spacing:.4px; opacity:.92; display:inline-block; transform:rotate(-1.5deg)}

  h1{font-family:'Anton',sans-serif; font-weight:400; line-height:.94;
    font-size:clamp(2.5rem,7.4vw,5rem); letter-spacing:1px; margin:.18em 0 .42em;
    text-transform:uppercase}
  h1 .glow{color:var(--green); text-shadow:0 0 30px rgba(151,196,89,.35)}
  .sub{font-family:'Source Serif 4',Georgia,serif; color:var(--warm);
    font-size:clamp(1rem,2.2vw,1.18rem); max-width:500px; margin:0 auto; opacity:.82; font-weight:400}

  /* ---- stage: the bus is a grounded specimen under a soft gallery light ---- */
  .stage{position:relative; height:clamp(260px,38vh,360px); margin:26px auto 14px;
    width:100%; display:flex; align-items:flex-end; justify-content:center}
  .spotlight{position:absolute; bottom:24px; left:50%; transform:translateX(-50%);
    width:min(680px,92vw); height:240px; z-index:0; pointer-events:none;
    background:radial-gradient(60% 70% at 50% 60%, rgba(151,196,89,.13), transparent 70%)}
  .ground{position:absolute; bottom:46px; left:50%; transform:translateX(-50%);
    width:min(440px,70vw); height:30px; z-index:1; pointer-events:none;
    background:radial-gradient(closest-side, rgba(0,0,0,.55), transparent 78%);
    filter:blur(7px)}
  .floater{position:relative; z-index:5; width:min(560px,86vw);
    transform:translateY(18px); opacity:0;
    animation:arrive 1.25s cubic-bezier(.2,.65,.2,1) .15s forwards}
  @keyframes arrive{to{transform:translateY(0); opacity:1}}
  .bus{display:block; width:100%;
    filter:drop-shadow(0 20px 22px rgba(0,0,0,.5));
    transform-origin:55% 88%; animation:breathe 8s ease-in-out infinite;
    transition:transform 1.7s cubic-bezier(.5,0,.32,1), opacity 1.45s ease-in .12s;
    will-change:transform}
  .bus img{width:100%; display:block}
  /* breathing = barely-there life, NO vertical bounce */
  @keyframes breathe{0%,100%{transform:scale(1) rotate(0deg)}50%{transform:scale(1.012) rotate(.25deg)}}

  /* interaction states */
  .bus.depart{animation:none; transform:translateX(132%) scale(.78) rotate(1.5deg); opacity:0}
  .bus.pullback{animation:none; transform:translateX(-9%) scale(.97) rotate(-1.2deg); opacity:.78}

  /* ---- ticket buttons ---- */
  .tickets{display:flex; gap:16px; justify-content:center; flex-wrap:wrap; margin-top:6px}
  .ticket{--c:var(--green); position:relative; cursor:pointer; border:none; background:#11160c;
    color:var(--cream); font-family:'Anton',sans-serif; letter-spacing:1.5px;
    text-transform:uppercase; font-size:1.4rem; padding:17px 34px; border-radius:13px;
    box-shadow:0 0 0 1.5px var(--c) inset, 0 12px 26px rgba(0,0,0,.4);
    transition:transform .35s cubic-bezier(.2,.7,.2,1), box-shadow .35s ease, background .35s ease}
  .ticket small{display:block; font-family:'Inter'; font-weight:500; font-size:.6rem;
    letter-spacing:2.5px; color:var(--warm); opacity:.6; margin-top:5px}
  .ticket::before,.ticket::after{content:""; position:absolute; top:50%; width:14px; height:14px;
    background:var(--bg); border-radius:50%; transform:translateY(-50%)}
  .ticket::before{left:-8px} .ticket::after{right:-8px}
  .ticket:hover{transform:translateY(-3px);
    box-shadow:0 0 0 1.5px var(--c) inset, 0 0 26px -6px var(--c), 0 18px 30px rgba(0,0,0,.45)}
  .ticket:active{transform:translateY(-1px)}
  .ticket.yes{--c:var(--green)} .ticket.no{--c:#6f6f6f} .ticket.maybe{--c:var(--fun); font-size:1.55rem}

  /* ---- result panel ---- */
  .panel{margin:34px auto 0; max-width:600px; min-height:8px}
  .card{background:linear-gradient(180deg,#12170d,#0d110a);
    border:1px solid rgba(151,196,89,.22); border-radius:18px; padding:30px 30px 26px;
    box-shadow:0 26px 60px rgba(0,0,0,.5); opacity:0; transform:translateY(16px);
    animation:rise .65s cubic-bezier(.2,.7,.2,1) forwards}
  @keyframes rise{to{opacity:1; transform:none}}
  .card .stamp{font-family:'Inter'; font-weight:800; letter-spacing:2.5px; font-size:.62rem;
    text-transform:uppercase; color:var(--green); border:1px solid rgba(151,196,89,.4);
    display:inline-block; padding:7px 13px; border-radius:20px; margin-bottom:16px}
  .card h2{font-family:'Anton'; font-weight:400; font-size:1.85rem; line-height:1.06;
    text-transform:uppercase; letter-spacing:.5px; margin-bottom:10px}
  .card p{font-family:'Source Serif 4',Georgia,serif; color:var(--warm); font-size:1.06rem; line-height:1.55}
  .card .big{font-family:'Anton'; font-size:clamp(2rem,7vw,2.7rem); color:var(--fun); display:block;
    margin:8px 0 4px; letter-spacing:1px; transition:opacity .26s ease, filter .26s ease, transform .26s ease}
  .card .next{margin-top:12px; font-family:'Inter'; font-weight:600; color:var(--green); letter-spacing:.3px}
  .card .next b{font-weight:800}
  .mini{margin-top:20px; display:flex; gap:12px; justify-content:center; flex-wrap:wrap}
  .mini button{cursor:pointer; font-family:'Inter'; font-weight:600; font-size:.82rem;
    letter-spacing:.4px; padding:11px 19px; border-radius:10px; border:1px solid rgba(243,234,214,.2);
    background:transparent; color:var(--cream); transition:.25s}
  .mini button:hover{background:rgba(243,234,214,.07); border-color:var(--green)}
  .mini button.solid{background:var(--green); color:#0a0a0a; border-color:var(--green)}
  .mini button.solid:hover{background:#a6d062}
  .footer{margin-top:46px; font-family:'Caveat',cursive; color:var(--warm); opacity:.5; font-size:1.1rem}

  @media (prefers-reduced-motion: reduce){
    .bus,.floater{animation:none!important} .bus{transition:none}
  }
</style>
</head>
<body>
<canvas id="stars"></canvas>
<canvas id="fx"></canvas>

<div class="wrap">
  <span class="kicker">exact fare not required · check your ticket ✦</span>
  <h1>Get on the<br><span class="glow">Maverick Magic Bus</span>?</h1>
  <p class="sub">Weirdos, misfits, mischief-makers &amp; reality-benders welcome. One small catch: there's no map.</p>

  <div class="stage">
    <div class="spotlight"></div>
    <div class="ground"></div>
    <div class="floater" id="floater">
      <div class="bus" id="bus"><img src="assets/bus-only.png" alt="Hand-drawn green Maverick Magic Bus with a rainbow trail"></div>
    </div>
  </div>

  <div class="tickets">
    <button class="ticket yes" onclick="sayYes()">Yes<small>all aboard</small></button>
    <button class="ticket no" onclick="sayNo()">No<small>maybe next loop</small></button>
    <button class="ticket maybe" onclick="sayMaybe()">???<small>surprise me</small></button>
  </div>

  <div class="panel" id="panel"></div>
  <div class="footer">a little voyage experiment · not the real fare ✦</div>
</div>

<script>
const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
let px=0, py=0, tpx=0, tpy=0;   // pointer-parallax offsets (shared by sky + bus)

/* ---------- sky: a calm constellation, not glitter ---------- */
const sky=document.getElementById('stars'), sx=sky.getContext('2d');
let stars=[], DPR=Math.min(devicePixelRatio||1,2);
function sizeSky(){
  const h=innerHeight*0.62;
  sky.width=innerWidth*DPR; sky.height=h*DPR; sx.setTransform(DPR,0,0,DPR,0,0);
  const n=Math.min(90, Math.floor(innerWidth*h/16000));
  stars=Array.from({length:n},()=>({
    x:Math.random()*innerWidth, y:Math.random()*h,
    r:Math.random()*1.3+.35, t:Math.random()*Math.PI*2,
    s:Math.random()*.007+.002,           // very slow drift
    base:Math.random()*.35+.25,
    c: Math.random()<.16 ? '#97c459' : (Math.random()<.5?'#f3ead6':'#d8c089')
  }));
}
sizeSky(); addEventListener('resize',sizeSky);
(function drawSky(){
  sx.clearRect(0,0,innerWidth,innerHeight);
  for(const st of stars){ st.t+=st.s; const a=st.base+Math.sin(st.t)*.22;
    sx.globalAlpha=Math.max(0,a); sx.fillStyle=st.c;
    sx.beginPath(); sx.arc(st.x+px,st.y+py*.5,st.r,0,7); sx.fill(); }
  sx.globalAlpha=1; requestAnimationFrame(drawSky);
})();

/* ---------- gentle pointer parallax (depth, not motion-for-its-own-sake) ---------- */
const floater=document.getElementById('floater');
if(!reduce) addEventListener('pointermove', e=>{
  tpx=(e.clientX/innerWidth-.5)*16; tpy=(e.clientY/innerHeight-.5)*10;
});
(function parallax(){
  px+=(tpx-px)*.05; py+=(tpy-py)*.05;
  floater.style.marginLeft=(-px*0.9)+'px';
  floater.style.marginTop=(-py*0.5)+'px';
  requestAnimationFrame(parallax);
})();

/* ---------- send-off particles: fine, weighted, slow (not party confetti) ---------- */
const fx=document.getElementById('fx'), cx=fx.getContext('2d');
function sizeFx(){ fx.width=innerWidth; fx.height=innerHeight; }
sizeFx(); addEventListener('resize',sizeFx);
let bits=[];
const PAL=['#97c459','#7bb02b','#f0c040','#c490e0','#f3ead6','#d8c089'];
function sendoff(n=40){
  if(reduce) return;
  const r=document.getElementById('bus').getBoundingClientRect();
  const ox=r.left+r.width*0.5, oy=r.top+r.height*0.55;
  for(let i=0;i<n;i++){ const ang=-Math.PI/2+(Math.random()-.5)*2.4, sp=Math.random()*4+1.2;
    bits.push({x:ox+(Math.random()-.5)*r.width*.5, y:oy,
      vx:Math.cos(ang)*sp*1.4, vy:Math.sin(ang)*sp-1.2,
      w:Math.random()*5+2, h:Math.random()*2+1.4, rot:Math.random()*7, vr:(Math.random()-.5)*.18,
      c:PAL[i%PAL.length], life:0, max:150+Math.random()*60}); }
}
(function fxLoop(){
  cx.clearRect(0,0,fx.width,fx.height);
  bits=bits.filter(b=>b.life<b.max);
  for(const b of bits){ b.vy+=.055; b.vx*=.992; b.x+=b.vx; b.y+=b.vy; b.rot+=b.vr; b.life++;
    cx.save(); cx.translate(b.x,b.y); cx.rotate(b.rot);
    cx.globalAlpha=Math.max(0,1-b.life/b.max)*.9; cx.fillStyle=b.c;
    cx.fillRect(-b.w/2,-b.h/2,b.w,b.h); cx.restore(); }
  requestAnimationFrame(fxLoop);
})();

/* ---------- sound: designed + sparse (soft sine, no sawtooth horn) ---------- */
let actx;
function AC(){ actx = actx || new (window.AudioContext||window.webkitAudioContext)(); return actx; }
function tone(freq, t0, dur, gain, type='sine'){
  const a=AC(), now=a.currentTime+t0;
  const o=a.createOscillator(), g=a.createGain(), lp=a.createBiquadFilter();
  lp.type='lowpass'; lp.frequency.value=2400;
  o.type=type; o.frequency.value=freq; o.connect(g); g.connect(lp); lp.connect(a.destination);
  g.gain.setValueAtTime(0,now); g.gain.linearRampToValueAtTime(gain,now+.02);
  g.gain.exponentialRampToValueAtTime(.0001,now+dur);
  o.start(now); o.stop(now+dur+.02);
}
function chime(){ try{ tone(523.25,0,.9,.07); tone(783.99,.10,1.0,.05); tone(1046.5,.20,.9,.03); }catch(e){} }
function softtick(f){ try{ tone(f,0,.16,.035,'triangle'); }catch(e){} }
function whoosh(){ // filtered-noise departure
  try{ const a=AC(), now=a.currentTime, dur=1.1;
    const buf=a.createBuffer(1, a.sampleRate*dur, a.sampleRate), d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*(1-i/d.length);
    const src=a.createBufferSource(); src.buffer=buf;
    const bp=a.createBiquadFilter(); bp.type='bandpass'; bp.Q.value=.8;
    bp.frequency.setValueAtTime(900,now); bp.frequency.exponentialRampToValueAtTime(180,now+dur);
    const g=a.createGain(); g.gain.setValueAtTime(.0001,now);
    g.gain.linearRampToValueAtTime(.05,now+.12); g.gain.exponentialRampToValueAtTime(.0001,now+dur);
    src.connect(bp); bp.connect(g); g.connect(a.destination); src.start(now); src.stop(now+dur);
  }catch(e){}
}

/* ---------- helpers ---------- */
const bus=document.getElementById('bus'), panel=document.getElementById('panel');
function resetBus(){ bus.className='bus'; }
function show(html){ panel.innerHTML='<div class="card">'+html+'</div>';
  panel.scrollIntoView({behavior:'smooth',block:'nearest'}); }

/* ---------- YES — cinematic departure ---------- */
const DESTS=['the unknown','Year One of something weird','your next impossible idea',
  'the edge of the comfort zone','a room full of your people','the plot twist','beyond the map',
  'the version of you that already did it','good trouble','the cosmic punchline'];
function sayYes(){
  chime(); setTimeout(whoosh,140); sendoff(42);
  resetBus(); void bus.offsetWidth; bus.classList.add('depart');
  show(`<span class="stamp">Ticket stamped · Aboard</span>
    <h2>Welcome aboard, Maverick.</h2>
    <p>The doors close, the rainbow catches, and the bus leans into the horizon —
    no map, no exact fare. Just a busload of beautiful troublemakers headed somewhere
    that doesn't exist yet.</p>
    <p class="next">Next stop: <b id="dest">the unknown</b> ✦</p>
    <div class="mini">
      <button class="solid" onclick="reroute()">Reroll the destination</button>
      <button onclick="resetRide()">Back to the stop</button>
    </div>`);
  setTimeout(resetBus, 2600);
}
function reroute(){ softtick(680); const d=document.getElementById('dest');
  if(d){ d.style.opacity=0; setTimeout(()=>{ d.textContent=DESTS[Math.floor(Math.random()*DESTS.length)];
    d.style.transition='opacity .3s'; d.style.opacity=1; }, 150); } }

/* ---------- NO — a dignified pull-away ---------- */
function sayNo(){
  tone(196,0,.5,.05); resetBus(); void bus.offsetWidth; bus.classList.add('pullback');
  show(`<span class="stamp" style="color:#9a9a9a;border-color:rgba(255,255,255,.18)">No refunds on wonder</span>
    <h2>The bus pulls away.</h2>
    <p>But here's the thing about the Magic Bus — <em>it always comes back around.</em>
    It'll idle at your corner, rainbow humming, for exactly as long as it takes.</p>
    <div class="mini">
      <button class="solid" onclick="sayYes()">On second thought — yes →</button>
      <button onclick="resetRide()">Let it loop</button>
    </div>`);
  setTimeout(resetBus, 1900);
}

/* ---------- ??? — a slowing, decelerating reveal (no arcade slot machine) ---------- */
const SEATS=[
  ['WEIRDO','Beautifully mis-wired. The world catches up to you later.'],
  ['MISFIT','You never fit the box — so you built a better one.'],
  ['MISCHIEF MAKER','Good trouble is your native language.'],
  ['RULE BREAKER','Rules are just v1.0. You ship the patch.'],
  ['REALITY BENDER','You renegotiate "possible" before breakfast.'],
  ['MULTI-DIMENSIONAL VISIONARY','You see three moves and one dimension ahead.'],
  ['COSMIC CREATOR','You make things that never asked permission to exist.'],
  ['REBEL ROUSER','You turn quiet rooms into movements.'],
  ['SUN SPARKER','You hand out light like it\'s free. (It is.)'],
  ['COMMUNITY CATALYST','The dots find each other when you\'re in the room.'],
  ['EVOLUTIONARY','You don\'t adapt to the future — you recruit it.'],
  ['MAVERICK MYSTIC','Equal parts hustle and wonder. Bottom line meets cosmos.']
];
let spinId=0;
function sayMaybe(){
  const myId=++spinId; softtick(440);
  show(`<span class="stamp" style="color:var(--fun);border-color:rgba(240,192,64,.4)">Mystery seat</span>
    <h2>Reading your ticket…</h2>
    <span class="big" id="seat">———</span>
    <p id="seatDesc" style="opacity:.7">the bus is deciding which kind of maverick you are…</p>
    <div class="mini">
      <button class="solid" onclick="sayMaybe()">Spin again</button>
      <button onclick="sayYes()">Claim this seat — yes →</button>
    </div>`);
  const seat=document.getElementById('seat'), desc=document.getElementById('seatDesc');
  function swap(name){ seat.style.opacity=0; seat.style.filter='blur(6px)';
    setTimeout(()=>{ if(spinId!==myId) return; seat.textContent=name;
      seat.style.opacity=1; seat.style.filter='blur(0)'; }, 120); }
  let delay=70, i=0; const total=14+Math.floor(Math.random()*5);
  (function step(){
    if(spinId!==myId) return;
    const pick=SEATS[Math.floor(Math.random()*SEATS.length)];
    swap(pick[0]); softtick(300+Math.random()*420); i++;
    if(i>=total){
      const f=SEATS[Math.floor(Math.random()*SEATS.length)];
      setTimeout(()=>{ if(spinId!==myId) return;
        seat.textContent=f[0]; seat.style.opacity=1; seat.style.filter='blur(0)';
        seat.style.transform='scale(1.06)'; setTimeout(()=>seat.style.transform='scale(1)',220);
        desc.textContent='“'+f[1]+'”'; desc.style.opacity=1; chime();
      }, 170);
      return;
    }
    delay*=1.16;                       // decelerate
    setTimeout(step, delay);
  })();
}

function resetRide(){ spinId++; resetBus(); panel.innerHTML='';
  window.scrollTo({top:0,behavior:'smooth'}); }
</script>
</body>
</html>
